        privacy: "本站不收集任何用户数据，隐私安全",
        about: "关于我们",
        privacyPage: "隐私政策",
        feedback: "反馈建议",
        useNow: "立即使用",
        tagFree: "完全免费",
        tagLimited: "有限额"
      },
      en: {
        title: "jqdf Tool Navigation",
        subtitle: "Curated Free · No Signup · Ready-to-use Online Tools",
        placeholder: "Search tools, features or tags...",
        cats: { all: "All", image: "Image", video: "Video/Audio", pdf: "PDF/Doc", ocr: "OCR/Text", dev: "Dev/Design", convert: "Converter" },
        noResult: "No tools found, try other keywords",
        footer: "Tools belong to their original authors, this site is for navigation only",
        privacy: "This site does not collect any user data, privacy secure",
        about: "About Us",
        privacyPage: "Privacy Policy",
        feedback: "Feedback",
        useNow: "Use Now",
        tagFree: "Free Forever",
        tagLimited: "Limited"
      }
    };

    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentCat = 'all';
    let currentLang = 'zh';

    // 初始化语言
    function initLang() {
      const urlParams = new URLSearchParams(window.location.search);
      currentLang = urlParams.get('lang') || localStorage.getItem('jqdf-lang') || 'zh';
      updateLangUI();
    }

    // 切换语言
    function switchLang(lang) {
      currentLang = lang;
      localStorage.setItem('jqdf-lang', lang);
      
      const url = new URL(window.location);
      url.searchParams.set('lang', lang);
      window.history.pushState({}, '', url);
      
      updateLangUI();
      renderTools(getFilteredTools());
    }

    // 更新界面文本
    function updateLangUI() {
      const t = i18n[currentLang];
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.title = t.title;
      document.querySelector('.title-text').textContent = t.title;
      document.getElementById('subtitle-text').textContent = t.subtitle;
      searchInput.placeholder = t.placeholder;
      document.getElementById('noResults').textContent = t.noResult;
      document.getElementById('footer-text').textContent = t.footer;
      document.getElementById('privacy-text').textContent = t.privacy;
      document.getElementById('about-link').textContent = t.about;
      document.getElementById('privacy-link').textContent = t.privacyPage;
      document.getElementById('feedback-link').textContent = t.feedback;
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if(btn.dataset.cat === 'image') btn.querySelector('.cat-img').textContent = t.cats.image;
        if(btn.dataset.cat === 'video') btn.querySelector('.cat-video').textContent = t.cats.video;
        if(btn.dataset.cat === 'pdf') btn.querySelector('.cat-pdf').textContent = t.cats.pdf;
        if(btn.dataset.cat === 'ocr') btn.querySelector('.cat-ocr').textContent = t.cats.ocr;
        if(btn.dataset.cat === 'dev') btn.querySelector('.cat-dev').textContent = t.cats.dev;
        if(btn.dataset.cat === 'convert') btn.querySelector('.cat-convert').textContent = t.cats.convert;
        if(btn.dataset.cat === 'all') btn.textContent = t.cats.all;
      });

      document.getElementById('btn-zh').classList.toggle('active', currentLang === 'zh');
      document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    }

    // 获取当前过滤后的工具
    function getFilteredTools() {
      const query = searchInput.value.toLowerCase().trim();
      return tools.filter(t => {
        const matchCat = currentCat === 'all' || t.cat === currentCat;
        const matchText = !query || 
          t.name[currentLang].toLowerCase().includes(query) || 
          t.tags[currentLang].toLowerCase().includes(query) || 
          t.desc[currentLang].toLowerCase().includes(query);
        return matchCat && matchText;
      });
    }

    // 渲染工具卡片
    function renderTools(data) {
      grid.innerHTML = '';
      if (data.length === 0) { noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      
      const t = i18n[currentLang];
      
      data.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const tagClass = tool.type === 'free' ? 'tag-free' : 'tag-limited';
        const tagText = tool.type === 'free' ? t.tagFree : t.tagLimited;
        
        card.innerHTML = `
          <h3><a href="${tool.url}" target="_blank" rel="noopener noreferrer">${tool.name[currentLang]} ↗</a></h3>
          <div class="tags">
            <span class="tag ${tagClass}">${tagText}</span>
            ${tool.tags[currentLang].split(',').map(tag => `<span class="tag tag-other">${tag.trim()}</span>`).join('')}
          </div>
          <div class="desc">${tool.desc[currentLang]}</div>
          <a href="${tool.url}" class="visit-btn" target="_blank" rel="noopener noreferrer">${t.useNow}</a>
        `;
        grid.appendChild(card);
      });
    }

    // 事件绑定
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderTools(getFilteredTools());
      });
    });

    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => renderTools(getFilteredTools()), 150);
    });

    // 启动
    initLang();
    renderTools(tools);
  </script>
</body>
</html>
