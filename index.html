      { name: "Online Video Cutter", url: "https://online-video-cutter.com/cn", cat: "video", tags: "视频裁剪, 旋转, 稳定", desc: "123apps出品，精准裁剪视频片段并旋转/翻转" },
      { name: "Kapwing", url: "https://www.kapwing.com/cmn-hans-cn", cat: "video", tags: "AI视频, 字幕生成", desc: "AI驱动的视频编辑平台，自动字幕、模板丰富" },
      { name: "PDF24 Tools", url: "https://tools.pdf24.org/zh/", cat: "pdf", tags: "PDF全能, 合并, 压缩", desc: "25+种PDF工具完全免费，无水印无限制，本地处理" },

      { name: "Smallpdf", url: "https://smallpdf.com/cn/pdf-tools", cat: "pdf", tags: "PDF优化, 电子签名", desc: "瑞士品质PDF工具，界面简洁，支持云端同步（免费基础功能）" },
      { name: "PearOCR", url: "https://pearocr.com/", cat: "ocr", tags: "图片转文字, 本地识别", desc: "完全离线运行的OCR工具，保护隐私，支持多语言" },
      { name: "白描网页版", url: "https://web.baimiaoapp.com/", cat: "ocr", tags: "高精度OCR, 表格识别", desc: "国内知名OCR引擎网页版，识别率高，支持表格还原" },
      { name: "OnlineOCR", url: "https://www.onlineocr.net/zh_hans", cat: "ocr", tags: "PDF转Word, 免费额度", desc: "老牌在线OCR，支持PDF/图片转Word/Excel/文本" },
      { name: "TextIn Tools", url: "https://tools.textin.com/", cat: "ocr", tags: "AI识别, 票据/表格", desc: "合合信息出品，支持复杂票据、表格、公式识别" },
      { name: "CatOCR", url: "https://catocr.com/", cat: "ocr", tags: "批量提取, 免费", desc: "专注批量图片文字提取，界面极简无广告干扰" },
      { name: "Carbon", url: "https://carbon.now.sh/", cat: "dev", tags: "代码美化, 分享图片", desc: "将代码转换为精美图片，支持语法高亮与主题定制" },
      { name: "JSON Formatter", url: "https://jsonformatter.curiousconcept.com/", cat: "dev", tags: "JSON校验, 格式化", desc: "快速验证、格式化、压缩JSON数据，支持语法树" },
      { name: "RegExr", url: "https://regexr.com/", cat: "dev", tags: "正则表达式, 在线测试", desc: "交互式正则表达式测试工具，实时匹配与高亮" },
      { name: "Coolors", url: "https://coolors.co/", cat: "dev", tags: "配色方案, 灵感生成", desc: "专业配色生成器，支持从图片提取、导出多格式" },
      { name: "Unsplash", url: "https://unsplash.com/", cat: "dev", tags: "免费图库, 高分辨率", desc: "全球最大免费高质量图片库，CC0协议可商用" },
      { name: "Pexels", url: "https://www.pexels.com/zh-cn/", cat: "dev", tags: "免费视频, 图片素材", desc: "海量免费可商用图片与短视频，支持多语言搜索" },
      { name: "Canva", url: "https://www.canva.cn/", cat: "dev", tags: "在线设计, 模板丰富", desc: "零基础设计神器，海报/简历/PPT模板一键套用" },
      { name: "Figma", url: "https://www.figma.com/", cat: "dev", tags: "UI设计, 实时协作", desc: "行业标准UI/UX设计工具，免费版满足个人需求" },
      { name: "OmniTools", url: "https://www.lilin.us/", cat: "dev", tags: "综合工具箱, 开发者", desc: "100+免注册工具集合，图片/SEO/二维码一站搞定" },
      { name: "Convertio", url: "https://convertio.co/zh/", cat: "dev", tags: "全格式转换, 300+支持", desc: "支持文档/图片/音频/视频等300+格式互转" }
    ];

    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentCat = 'all';

    function renderTools(data) {
      grid.innerHTML = '';
      if (data.length === 0) { noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      
      data.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3><a href="${tool.url}" target="_blank" rel="noopener noreferrer">${tool.name} ↗</a></h3>
          <div class="tags">${tool.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>
          <div class="desc">${tool.desc}</div>
          <a href="${tool.url}" class="visit-btn" target="_blank" rel="noopener noreferrer">立即使用</a>
        `;
        grid.appendChild(card);
      });
    }

    function filterTools() {
      const query = searchInput.value.toLowerCase().trim();
      const filtered = tools.filter(t => {
        const matchCat = currentCat === 'all' || t.cat === currentCat;
        const matchText = !query || 
          t.name.toLowerCase().includes(query) || 
          t.tags.toLowerCase().includes(query) || 
          t.desc.toLowerCase().includes(query);
        return matchCat && matchText;
      });
      renderTools(filtered);
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        filterTools();
      });
    });

    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(filterTools, 150);
    });

    renderTools(tools);
  </script>
